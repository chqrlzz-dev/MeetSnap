  <!-- Camera body -->
  <rect x="22" y="42" width="84" height="58" rx="10" ry="10"
    fill="none" stroke="#00e5ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Viewfinder bump -->
  <path d="M48 42 L55 30 L73 30 L80 42" fill="none" stroke="#00e5ff"
